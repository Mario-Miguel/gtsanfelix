# Create the Secret from your local serviceAccount.json (run once):
#
#   kubectl create secret generic firebase-sa \
#     --from-file=serviceAccount.json=./serviceAccount.json \
#     --namespace=gtsanfelix
#
# The file below is the equivalent declarative form — DO NOT commit with real values.
# Fill in the base64-encoded content of serviceAccount.json:
#
#   base64 -w 0 serviceAccount.json
#
apiVersion: v1
kind: Secret
metadata:
  name: firebase-sa
  namespace: gtsanfelix
type: Opaque
data:
  serviceAccount.json: <BASE64_ENCODED_SERVICE_ACCOUNT_JSON>
